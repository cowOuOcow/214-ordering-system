<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MACU 果粒茶訂購系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:#FFF9F5;color:#2A1010;min-height:100vh;}

nav{background:#D0232A;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(208,35,42,.12);}
.logo-area{display:flex;align-items:baseline;gap:8px;}
.logo-text{font-size:22px;font-weight:900;color:#fff;letter-spacing:1px;}
.logo-sub{font-size:12px;color:rgba(255,255,255,.75);}
.nav-tabs{display:flex;gap:4px;}
.nav-tab{padding:6px 16px;border-radius:20px;border:1.5px solid rgba(255,255,255,.4);background:transparent;color:rgba(255,255,255,.8);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.nav-tab.active{background:#fff;color:#D0232A;border-color:#fff;}
.nav-tab:hover:not(.active){background:rgba(255,255,255,.15);color:#fff;}

.page{display:none;} .page.active{display:block;}

.order-wrap{max-width:660px;margin:0 auto;padding:20px 14px 80px;}
.hero{background:linear-gradient(135deg,#A51A20,#D0232A);border-radius:16px;padding:22px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;}
.hero::before{content:’’;position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.07);}
.hero-text h1{color:#fff;font-size:22px;font-weight:900;}
.hero-text p{color:rgba(255,255,255,.75);font-size:13px;margin-top:4px;}
.hero-emoji{font-size:52px;opacity:.9;}

.card{background:#fff;border:1.5px solid #F0D8D0;border-radius:12px;padding:16px;margin-bottom:14px;}
.card-title{font-size:13px;font-weight:700;color:#D0232A;letter-spacing:.5px;margin-bottom:10px;}
.field-input{width:100%;padding:10px 14px;border:1.5px solid #F0D8D0;border-radius:8px;font-size:15px;font-family:inherit;background:#FFF3EE;outline:none;transition:border .2s;}
.field-input:focus{border-color:#D0232A;}

.cat-wrap{overflow-x:auto;padding-bottom:2px;margin-bottom:14px;}
.cat-wrap::-webkit-scrollbar{height:0;}
.cat-row{display:flex;gap:7px;width:max-content;}
.cat-btn{padding:6px 15px;border-radius:20px;border:1.5px solid #F0D8D0;background:#fff;font-family:inherit;font-size:13px;font-weight:600;color:#666;cursor:pointer;white-space:nowrap;transition:all .15s;}
.cat-btn.active{background:#D0232A;border-color:#D0232A;color:#fff;}

.drink-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.drink-card{background:#fff;border:1.5px solid #F0D8D0;border-radius:11px;padding:13px 11px;cursor:pointer;position:relative;transition:all .15s;}
.drink-card:hover{border-color:#D0232A;}
.drink-card.selected{border-color:#D0232A;background:#FDECEA;}
.drink-card.selected::after{content:‘✓’;position:absolute;top:7px;right:9px;background:#D0232A;color:#fff;width:18px;height:18px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:900;}
.drink-name{font-weight:700;font-size:13.5px;line-height:1.35;}
.drink-prices{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;}
.price-tag{font-size:11px;font-weight:600;color:#D0232A;background:#FDECEA;padding:2px 7px;border-radius:10px;}
.drink-tag{font-size:10px;color:#fff;background:#E8A020;padding:1px 6px;border-radius:6px;margin-bottom:4px;display:inline-block;}

.opt-section{margin-bottom:14px;}
.opt-label{font-size:12px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:7px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:5px 13px;border-radius:20px;border:1.5px solid #F0D8D0;background:#FFF3EE;font-family:inherit;font-size:13px;font-weight:500;color:#2A1010;cursor:pointer;transition:all .15s;}
.chip.selected{background:#2A1010;border-color:#2A1010;color:#fff;}

.size-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:8px;}
.size-card{border:2px solid #F0D8D0;border-radius:10px;padding:12px 8px;cursor:pointer;text-align:center;background:#fff;transition:all .15s;position:relative;}
.size-card:hover:not(.disabled){border-color:#D0232A;}
.size-card.selected{border-color:#D0232A;background:#FDECEA;}
.size-card.selected::after{content:‘✓’;position:absolute;top:5px;right:7px;background:#D0232A;color:#fff;width:15px;height:15px;border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:900;}
.size-card.disabled{opacity:.3;cursor:not-allowed;pointer-events:none;}
.size-icon{font-size:20px;}
.size-label{font-size:13px;font-weight:700;margin-top:4px;}
.size-price{font-size:14px;font-weight:900;color:#D0232A;margin-top:2px;}

.note-hint{font-size:12px;color:#E8A020;margin-top:7px;font-weight:700;}

.submit-btn{width:100%;padding:15px;background:#D0232A;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;box-shadow:0 4px 16px rgba(208,35,42,.12);}
.submit-btn:hover{background:#A51A20;transform:translateY(-1px);}

.admin-wrap{max-width:920px;margin:0 auto;padding:20px 14px 60px;}
.admin-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.admin-top h2{font-size:20px;font-weight:900;}
.danger-btn{padding:9px 20px;background:#C0392B;border:none;border-radius:8px;color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.danger-btn.confirm-state{background:#E67E22;}

.total-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.total-card{background:#fff;border:1.5px solid #F0D8D0;border-radius:12px;padding:14px 10px;text-align:center;}
.total-card.hi{background:#FDECEA;border-color:#D0232A;}
.tc-icon{font-size:20px;margin-bottom:4px;}
.tc-num{font-size:22px;font-weight:900;color:#D0232A;line-height:1.1;}
.tc-label{font-size:11px;color:#999;margin-top:3px;font-weight:600;}
.tc-sub{font-size:11px;color:#27AE60;font-weight:700;margin-top:2px;}
.tc-sub.warn{color:#E67E22;}

.summary-box{background:#D0232A;border-radius:14px;padding:18px;margin-bottom:20px;color:#fff;}
.summary-box h3{font-size:15px;font-weight:700;margin-bottom:12px;color:rgba(255,255,255,.85);}
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.sum-item{background:rgba(255,255,255,.14);border-radius:9px;padding:12px 14px;}
.sum-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.sum-name{font-weight:700;font-size:14px;}
.sum-count{font-size:24px;font-weight:900;color:#FFD580;line-height:1;}
.sum-vars{display:flex;flex-direction:column;gap:3px;margin-top:2px;}
.sum-var{font-size:11.5px;color:rgba(255,255,255,.85);display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.12);border-radius:5px;padding:3px 8px;}
.sum-var-cnt{font-weight:900;color:#FFD580;font-size:12px;margin-left:6px;flex-shrink:0;}

.orders-head{font-size:15px;font-weight:700;margin-bottom:10px;}
.order-row{background:#fff;border:1.5px solid #F0D8D0;border-radius:10px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;transition:all .2s;}
.order-row.paid{border-color:#9EE0B5;background:#F4FFF8;}
.order-row.has-note{border-color:#E8A020;border-left:4px solid #E8A020;}
.or-info{flex:1;min-width:0;}
.or-name{font-weight:700;font-size:15px;}
.or-time{font-size:11px;color:#999;margin-left:6px;}
.or-drink{font-size:14px;font-weight:700;color:#D0232A;margin-top:3px;}
.or-size{display:inline-block;font-size:11px;color:#D0232A;background:#FDECEA;padding:1px 8px;border-radius:8px;margin-right:6px;font-weight:600;}
.or-opts{font-size:13px;color:#777;margin-top:3px;}
.or-note{font-size:12px;color:#E8A020;margin-top:4px;font-weight:700;}
.pay-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;}
.pay-chk{width:20px;height:20px;accent-color:#27AE60;cursor:pointer;}
.pay-txt{font-size:11px;color:#999;}
.del-btn{margin-top:4px;background:none;border:1.5px solid #f5c0bc;border-radius:6px;padding:2px 6px;font-size:13px;cursor:pointer;color:#C0392B;transition:all .15s;}
.del-btn:hover{background:#FDECEA;}

.empty-state{text-align:center;padding:56px 20px;color:#999;}
.empty-state .ei{font-size:52px;margin-bottom:12px;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#27AE60;color:#fff;padding:11px 26px;border-radius:30px;font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;}

@media(max-width:480px){
.total-bar{grid-template-columns:1fr 1fr;}
.size-card{padding:10px 4px;}
.size-icon{font-size:17px;}
}
</style>

</head>

<nav>

  </div>

    <button class="nav-tab active" onclick="switchPage('order',this)">點餐</button>

  </div>
</nav>

<!-- ORDER PAGE -->

<div id="page-order" class="page active">
<div class="order-wrap">
  <div class="hero">
    <div class="hero-text"><h1>MACU 點餐系統</h1><p>design by 蔡丞翔</p></div>
    <div class="hero-emoji">🧋</div>
  </div>

  <div class="card">
    <div class="card-title">你的名字</div>
    <input class="field-input" id="orderName" type="text" placeholder="請輸入姓名">
  </div>

  <div class="cat-wrap"><div class="cat-row" id="catRow"></div></div>
  <div class="drink-grid" id="drinkGrid"></div>

  <div id="optCard" style="display:none">
    <div class="card">
      <div class="card-title" id="optTitle">規格選擇</div>
      <div class="opt-section">
        <span class="opt-label">杯型 / 瓶裝</span>
        <div class="size-row" id="sizeRow"></div>
      </div>
      <div class="opt-section">
        <span class="opt-label">糖度</span>
        <div class="chips" id="sugarChips"></div>
      </div>
      <div class="opt-section">
        <span class="opt-label">冰量</span>
        <div class="chips" id="iceChips"></div>
      </div>
    </div>
  </div>

  <div class="card" style="margin-bottom:14px">
    <div class="card-title">備註</div>
    <textarea class="field-input" id="orderNote" style="min-height:64px;resize:vertical" placeholder="加料或特殊需求（可不填）"></textarea>
    <div class="note-hint">⚠️ 加料請打在備註（例：加珍珠、加椰果）</div>
  </div>

<button class="submit-btn" onclick="submitOrder()">送出訂單 🛎️</button>

</div>
</div>

<!-- ADMIN PAGE -->

<div id="page-admin" class="page">

<!-- 密碼彈窗（只在需要時顯示） -->

<div id="adminLock" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:32px 28px;width:300px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.25);">
    <div style="font-size:36px;margin-bottom:12px;">🔒</div>
    <div style="font-weight:900;font-size:18px;margin-bottom:4px;">管理員驗證</div>
    <div id="pwDesc" style="font-size:13px;color:#999;margin-bottom:20px;"></div>
    <input id="pwInput" type="password" placeholder="請輸入密碼"
      style="width:100%;padding:10px 14px;border:1.5px solid #F0D8D0;border-radius:8px;font-size:15px;font-family:inherit;outline:none;margin-bottom:10px;"
      onkeydown="if(event.key==='Enter')checkPw()">
    <div id="pwError" style="font-size:12px;color:#C0392B;min-height:16px;margin-bottom:8px;"></div>
    <div style="display:flex;gap:8px;">
      <button onclick="closeLock()" style="flex:1;padding:12px;background:#eee;border:none;border-radius:10px;color:#555;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;">取消</button>
      <button onclick="checkPw()" style="flex:2;padding:12px;background:#D0232A;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;">確認</button>
    </div>
  </div>
</div>

<div class="admin-wrap">
  <div class="admin-top">
    <h2>📋 訂單管理</h2>
    <button class="danger-btn" id="clearBtn" data-confirm="0" onclick="clearOrders()">🗑️ 清除所有訂單</button>
  </div>

  <div class="total-bar">
    <div class="total-card hi"><div class="tc-icon">🧋</div><div class="tc-num" id="tc-cups">0</div><div class="tc-label">總杯數</div></div>
    <div class="total-card hi"><div class="tc-icon">💰</div><div class="tc-num" id="tc-total">$0</div><div class="tc-label">總金額</div></div>
    <div class="total-card"><div class="tc-icon">✅</div><div class="tc-num" id="tc-paid">$0</div><div class="tc-label">已收金額</div><div class="tc-sub" id="tc-paid-n"></div></div>
    <div class="total-card"><div class="tc-icon">⏳</div><div class="tc-num" id="tc-unpaid" style="color:#E67E22">$0</div><div class="tc-label">未收金額</div><div class="tc-sub warn" id="tc-unpaid-n"></div></div>
  </div>

  <div class="summary-box">
    <h3>📊 飲料統計</h3>
    <div class="sum-grid" id="sumGrid"><div style="font-size:13px;opacity:.6">尚無訂單</div></div>
  </div>

  <div class="orders-head">所有訂單 <span id="orderCount" style="font-weight:400;font-size:13px;color:#999"></span></div>
  <div id="ordersList"></div>
</div>
</div>

<div class="toast" id="toast"></div>

  {id:100, cat:'鮮奶系列', name:'粉粿紅茶拿鐵',   tag:'',         M:null, L:65, B:95 },
  {id:101, cat:'鮮奶系列', name:'紅茶拿鐵',       tag:'',         M:null, L:65, B:95 },
  {id:102, cat:'鮮奶系列', name:'鐵觀音拿鐵',     tag:'',         M:null, L:65, B:95 },
  {id:103, cat:'鮮奶系列', name:'波霸紅茶拿鐵',   tag:'',         M:null, L:65, B:95 },
  {id:104, cat:'鮮奶系列', name:'仙草凍紅茶拿鐵', tag:'',         M:null, L:65, B:95 },
  {id:105, cat:'鮮奶系列', name:'阿華田拿鐵',     tag:'',         M:null, L:65, B:95 },
  {id:106, cat:'鮮奶系列', name:'玫瑰紅茶拿鐵',   tag:'品牌限定', M:null, L:70, B:100},
  // 其他

const SUGAR_OPTS = ['無糖','一分','微糖','半糖','八分','正常'];
const ICE_OPTS   = ['去冰','微冰','少冰','正常冰'];

let selDrink=null, selSize=null, selSugar='正常', selIce='正常冰', selCat='飲中甜品';

const GAS_URL = 'https://script.google.com/macros/s/AKfycbyC_YTeonyIwpxUARTe_uSyFHL0_7Quf21-5nP1HrBBGzdYj3A4rXuNi_ocEtwXw2s/exec';

function getOrders(){ try{ return JSON.parse(localStorage.getItem('macuOrders')||'[]'); }catch{ return []; } }
function saveOrders(a){ localStorage.setItem('macuOrders', JSON.stringify(a)); }

function buildOrder(){
  const cats=[...new Set(MENU.map(d=>d.cat))];
  const catRow=document.getElementById('catRow');
  catRow.innerHTML='';
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(c===selCat?' active':'');
    b.textContent=c; b.onclick=()=>{ selCat=c; buildOrder(); };
    catRow.appendChild(b);
  });
  renderDrinks();
  refreshChips();
}

function renderDrinks(){
  const grid=document.getElementById('drinkGrid');
  grid.innerHTML='';
  MENU.filter(d=>d.cat===selCat).forEach(d=>{
    const el=document.createElement('div');
    el.className='drink-card'+(selDrink?.id===d.id?' selected':'');
    el.onclick=()=>pickDrink(d);
    let px='';
    if(d.M!=null) px+=`<span class="price-tag">中 $${d.M}</span>`;
    if(d.L!=null) px+=`<span class="price-tag">大 $${d.L}</span>`;
    if(d.B!=null) px+=`<span class="price-tag">瓶 $${d.B}</span>`;
    el.innerHTML=`${d.tag?`<div class="drink-tag">${d.tag}</div>`:''}
      <div class="drink-name">${d.name}</div>
      <div class="drink-prices">${px}</div>`;
    grid.appendChild(el);
  });
}

function pickDrink(d){
  selDrink=d; selSize=null;
  renderDrinks();
  document.getElementById('optCard').style.display='block';
  document.getElementById('optTitle').textContent=`規格選擇 — ${d.name}`;
  renderSizes(d);
  refreshChips();
}

function renderSizes(d){
  const row=document.getElementById('sizeRow'); row.innerHTML='';
  [{k:'M',l:'中杯',i:'🥤',p:d.M},{k:'L',l:'大杯',i:'🧋',p:d.L},{k:'B',l:'瓶裝',i:'🍶',p:d.B}].forEach(s=>{
    const el=document.createElement('div');
    const ok=s.p!=null;
    el.className='size-card'+(selSize===s.k?' selected':'')+(ok?'':' disabled');
    if(ok) el.onclick=()=>{ selSize=s.k; renderSizes(d); };
    el.innerHTML=`<div class="size-icon">${s.i}</div><div class="size-label">${s.l}</div><div class="size-price">${ok?'$'+s.p:'—'}</div>`;
    row.appendChild(el);
  });
}

function refreshChips(){
  buildChips('sugarChips', SUGAR_OPTS, selSugar, v=>{ selSugar=v; refreshChips(); });
  buildChips('iceChips',   ICE_OPTS,   selIce,   v=>{ selIce=v;   refreshChips(); });
}

function buildChips(id, opts, cur, fn){
  const div=document.getElementById(id); div.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='chip'+(o===cur?' selected':'');
    b.textContent=o; b.onclick=()=>fn(o);
    div.appendChild(b);
  });
}

function submitOrder(){
  const name=document.getElementById('orderName').value.trim();
  if(!name)    { showToast('❗ 請輸入名字','#C0392B'); return; }
  if(!selDrink){ showToast('❗ 請選擇飲料','#C0392B'); return; }
  if(!selSize) { showToast('❗ 請選擇杯型','#C0392B'); return; }
  const price = selSize==='M'?selDrink.M : selSize==='L'?selDrink.L : selDrink.B;
  const sizeLabel = selSize==='M'?'中杯' : selSize==='L'?'大杯':'瓶裝';
  const note=document.getElementById('orderNote').value.trim();
  const order={
    id:Date.now(), name,
    drinkId:selDrink.id, drinkName:selDrink.name, drinkCat:selDrink.cat,
    size:sizeLabel, price, sugar:selSugar, ice:selIce, note,
    paid:false,
    time:new Date().toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).replace(/\//g,'/').replace(' ','  ')
  };
  // 存到 localStorage
  const arr=getOrders();
  arr.push(order);
  saveOrders(arr);
  // 送到 Google 試算表
  showToast('⏳ 傳送中...','#E8A020');
  fetch(GAS_URL, {
    method:'POST',
    body: JSON.stringify({...order, action:'add'})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.status==='ok') showToast('✅ 訂單已成功送出！');
    else showToast('⚠️ 傳送失敗，請重試','#C0392B');
  })
  .catch(()=>showToast('⚠️ 網路錯誤，請重試','#C0392B'));
  selDrink=null; selSize=null;
  document.getElementById('orderName').value='';
  document.getElementById('orderNote').value='';
  document.getElementById('optCard').style.display='none';
  renderDrinks();
}

function renderAdmin(){
  document.getElementById('sumGrid').innerHTML='<div style="font-size:13px;opacity:.6">載入中...</div>';
  document.getElementById('ordersList').innerHTML='';
  fetch(GAS_URL)
    .then(r=>r.json())
    .then(data=>{
      const arr = data.orders || [];
      renderTotals(arr); renderSum(arr); renderList(arr);
      document.getElementById('orderCount').textContent=arr.length?`（共 ${arr.length} 筆）`:'';
    })
    .catch(()=>{
      // fallback to localStorage if offline
      const arr=getOrders();
      renderTotals(arr); renderSum(arr); renderList(arr);
      document.getElementById('orderCount').textContent='（離線模式）';
    });
}

function renderTotals(arr){
  const total=arr.reduce((s,o)=>s+(o.price||0),0);
  const paid=arr.filter(o=>o.paid), unpaid=arr.filter(o=>!o.paid);
  const paidAmt=paid.reduce((s,o)=>s+(o.price||0),0);
  const unpAmt=unpaid.reduce((s,o)=>s+(o.price||0),0);
  document.getElementById('tc-cups').textContent=arr.length;
  document.getElementById('tc-total').textContent=`$${total}`;
  document.getElementById('tc-paid').textContent=`$${paidAmt}`;
  document.getElementById('tc-unpaid').textContent=`$${unpAmt}`;
  document.getElementById('tc-paid-n').textContent=paid.length?`${paid.length} 人已付`:'';
  document.getElementById('tc-unpaid-n').textContent=unpaid.length?`${unpaid.length} 人未付`:'';
}

function renderSum(arr){
  const box=document.getElementById('sumGrid');
  if(!arr.length){ box.innerHTML='<div style="font-size:13px;opacity:.6">尚無訂單</div>'; return; }

  const drinkMap={};
  arr.forEach(o=>{
    const dk = `${o.drinkName}|${o.size}`;
    if(!drinkMap[dk]) drinkMap[dk]={ name:o.drinkName, size:o.size, total:0, variants:{}, noted:[] };
    drinkMap[dk].total++;
    if(o.note){
      // 有備註的單獨列出
      drinkMap[dk].noted.push({vk:`${o.sugar}・${o.ice}`, note:o.note});
    } else {
      const vk=`${o.sugar}・${o.ice}`;
      drinkMap[dk].variants[vk]=(drinkMap[dk].variants[vk]||0)+1;
    }
  });

  box.innerHTML='';
  Object.values(drinkMap).sort((a,b)=>b.total-a.total).forEach(drink=>{
    const el=document.createElement('div'); el.className='sum-item';
    // 一般疊加行
    const varRows = Object.entries(drink.variants)
      .sort((a,b)=>b[1]-a[1])
      .map(([vk,cnt])=>`<div class="sum-var"><span>${vk}</span><span class="sum-var-cnt">×${cnt}</span></div>`)
      .join('');
    // 有備註的單獨行
    const noteRows = drink.noted
      .map(({vk,note})=>`<div class="sum-var" style="border-left:2px solid #E8A020;"><span>${vk}（${note}）</span><span class="sum-var-cnt">×1</span></div>`)
      .join('');
    el.innerHTML=`
      <div class="sum-top">
        <div>
          <div class="sum-name">${drink.name}</div>
          <div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:1px">${drink.size}</div>
        </div>
        <div class="sum-count">${drink.total}</div>
      </div>
      <div class="sum-vars">${varRows}${noteRows}</div>`;
    box.appendChild(el);
  });
}

function renderList(arr){
  const list=document.getElementById('ordersList');
  if(!arr.length){ list.innerHTML='<div class="empty-state"><div class="ei">🧋</div><p>還沒有訂單</p></div>'; return; }
  list.innerHTML='';
  [...arr].sort((a,b)=>{
    const an=a.note?1:0, bn=b.note?1:0;
    if(bn!==an) return bn-an;
    return b.id-a.id;
  }).forEach(o=>{
    const row=document.createElement('div');
    row.className='order-row'+(o.paid?' paid':'')+(o.note?' has-note':'');
    row.innerHTML=`
      <div class="or-info">
        <div><span class="or-name">👤 ${o.name}</span><span class="or-time">${o.time}</span></div>
        <div class="or-drink">🧋 ${o.drinkName}</div>
        <div class="or-opts"><span class="or-size">${o.size} $${o.price}</span>${o.sugar} · ${o.ice}</div>
        ${o.note?`<div class="or-note">📝 ${o.note}</div>`:''}
      </div>
      <div class="pay-col">
        <input type="checkbox" class="pay-chk" ${o.paid?'checked':''} onchange="togglePaid(${o.id},this.checked)">
        <div class="pay-txt">${o.paid?'✅已付':'未付'}</div>
        <button class="del-btn" onclick="deleteOrder(${o.id})">🗑️</button>
      </div>`;
    list.appendChild(row);
  });
}

const ADMIN_PW = '214';   // ← 改這裡設定你的密碼
let adminUnlocked = false;
let pendingAction = null;  // 驗證通過後要執行的動作

function requireAuth(desc, action){
  if(adminUnlocked){ action(); return; }
  pendingAction = action;
  document.getElementById('pwDesc').textContent = desc;
  document.getElementById('pwInput').value = '';
  document.getElementById('pwError').textContent = '';
  const lock = document.getElementById('adminLock');
  lock.style.display = 'flex';
  setTimeout(()=>document.getElementById('pwInput').focus(), 100);
}

function checkPw(){
  const val = document.getElementById('pwInput').value;
  if(val === ADMIN_PW){
    adminUnlocked = true;
    document.getElementById('adminLock').style.display = 'none';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwError').textContent = '';
    if(pendingAction){ pendingAction(); pendingAction = null; }
  } else {
    document.getElementById('pwError').textContent = '❌ 密碼錯誤，請再試一次';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

function closeLock(){
  document.getElementById('adminLock').style.display = 'none';
  pendingAction = null;
}

function lockAdmin(){
  adminUnlocked = false;
}

function togglePaid(id, paid){
  requireAuth('請輸入密碼才能更改付款狀態', ()=>{
    showToast('⏳ 更新中...','#E8A020');
    fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'setPaid',id,paid})})
      .then(r=>r.json())
      .then(()=>{ renderAdmin(); showToast(paid?'✅ 已標記付款':'已取消付款'); })
      .catch(()=>{ renderAdmin(); showToast('⚠️ 更新失敗','#C0392B'); });
  });
  if(!adminUnlocked) renderAdmin();
}

function deleteOrder(id){
  requireAuth('請輸入密碼才能刪除訂單', ()=>{
    const arr = getOrders().filter(x=>x.id!==id);
    saveOrders(arr);
    fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'delete',id})}).catch(()=>{});
    renderAdmin();
    showToast('🗑️ 訂單已刪除');
  });
}

function clearOrders(){
  requireAuth('請輸入密碼才能清除所有訂單', ()=>{
    const btn=document.getElementById('clearBtn');
    if(btn.dataset.confirm!=='1'){
      btn.textContent='⚠️ 確定？再按一次確認';
      btn.classList.add('confirm-state');
      btn.dataset.confirm='1';
      setTimeout(()=>{
        btn.textContent='🗑️ 清除所有訂單';
        btn.classList.remove('confirm-state');
        btn.dataset.confirm='0';
      },3000);
      return;
    }
    localStorage.removeItem('macuOrders');
    fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'clearAll'})})
      .then(()=>{ renderAdmin(); showToast('🗑️ 已清除所有訂單'); })
      .catch(()=>{ renderAdmin(); showToast('⚠️ 試算表清除失敗','#C0392B'); });
    btn.textContent='🗑️ 清除所有訂單';
    btn.classList.remove('confirm-state');
    btn.dataset.confirm='0';
  });
}

function switchPage(p,btn){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  btn.classList.add('active');
  if(p==='admin'){
    renderAdmin();
    if(window._autoRefresh) clearInterval(window._autoRefresh);
    window._autoRefresh = setInterval(renderAdmin, 30000);
  } else {
    if(window._autoRefresh) clearInterval(window._autoRefresh);
  }
}

function showToast(msg,bg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=bg||'#27AE60';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

buildOrder();
